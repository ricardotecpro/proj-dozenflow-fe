<mat-card class="task-card">
  <div class="task-card-body">
    <p class="task-card-title">{{ task.title }}</p>
    <button
      mat-icon-button
      [matMenuTriggerFor]="taskMenu"
      class="task-menu-button"
      [attr.aria-label]="'Mais ações para ' + task.title"
    >
      <mat-icon>more_vert</mat-icon>
    </button>
  </div>
  @if (task.description || dueDateStatus) {
    <div class="task-card-footer">
      @if (dueDateStatus) {
        <span class="due-date-pill" [class]="dueDateStatus" matTooltip="Data de vencimento">
          <mat-icon>schedule</mat-icon>
          {{ dueDateLabel }}
        </span>
      }
      @if (task.description) {
        <mat-icon matTooltip="Tem descrição">subject</mat-icon>
      }
    </div>
  }
  <mat-menu #taskMenu="matMenu">
    <button mat-menu-item (click)="edit.emit()">
      <mat-icon>edit</mat-icon>
      <span>Editar</span>
    </button>
    <button mat-menu-item (click)="delete.emit()">
      <mat-icon>delete</mat-icon>
      <span>Excluir</span>
    </button>
  </mat-menu>
</mat-card>
