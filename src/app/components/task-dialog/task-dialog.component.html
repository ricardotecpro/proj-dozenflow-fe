<h2 mat-dialog-title>{{ data.task.id ? 'Editar Tarefa' : 'Nova Tarefa' }}</h2>

<mat-dialog-content>
  <mat-form-field appearance="fill">
    <mat-label>Título</mat-label>
    <input matInput [(ngModel)]="data.task.title" cdkFocusInitial />
  </mat-form-field>

  <mat-form-field appearance="fill">
    <mat-label>Descrição</mat-label>
    <textarea matInput [(ngModel)]="data.task.description"></textarea>
  </mat-form-field>
</mat-dialog-content>

<mat-dialog-actions align="end">
  <button mat-button (click)="cancel()">Cancelar</button>
  <button mat-flat-button color="primary" [mat-dialog-close]="data.task">
    {{ data.task.id ? 'Salvar' : 'Criar' }}
  </button>
</mat-dialog-actions>
